name: External Cron Ping

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ping-cron-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call monthly membership reminder cron
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/monthly-membership-payment-reminder" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Call monthly overdue reminder cron
        run: |
          curl --fail --show-error --silent \
            -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/monthly-overdue-payment-reminder" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
